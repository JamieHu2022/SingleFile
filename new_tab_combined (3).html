<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Endless Proxy</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500&display=swap');

:root {
  --cyan: #00e5ff;
  --cyan-dim: #00b8d4;
  --bg-dark: #020a12;
  --chrome-bg: #0d1117;
  --chrome-tab-active: #161d27;
  --chrome-nav: #111820;
  --chrome-bm: #0f1923;
  --text-main: #e0f7fa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-dark);
  font-family: 'Rajdhani', sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: var(--text-main);
  position: relative;
}

#city-canvas {
  position: fixed; inset:0; width:100%; height:100%; z-index:0;
}

/* ── Browser Chrome ── */
.browser-chrome {
  position: relative; z-index: 10;
  background: var(--chrome-bg);
  flex-shrink: 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.7);
}

/* Tab bar */
.tab-bar {
  display:flex; align-items:flex-end;
  padding:6px 10px 0 10px; gap:2px;
  background:var(--chrome-bg); height:38px; user-select:none;
}
.tab {
  display:flex; align-items:center; gap:8px; padding:0 12px;
  height:30px; background:var(--chrome-tab-active);
  border-radius:8px 8px 0 0; font-size:12px;
  font-family:'Rajdhani',sans-serif; font-weight:500;
  color:rgba(255,255,255,0.85);
  min-width:120px; max-width:200px;
  cursor:default; position:relative;
  border:1px solid rgba(0,229,255,0.12); border-bottom:none;
  flex-shrink:0; transition:background 0.15s;
}
.tab::after {
  content:''; position:absolute; top:0;left:0;right:0; height:2px;
  background:var(--cyan); border-radius:8px 8px 0 0;
  box-shadow:0 0 8px var(--cyan);
}
.tab-favicon {
  width:14px; height:14px; border-radius:2px;
  background:var(--cyan); opacity:0.8; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.tab-favicon svg { width:10px; height:10px; fill:#020a12; }
.tab-favicon img { width:14px; height:14px; border-radius:2px; object-fit:cover; }
.tab-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tab-close {
  width:16px; height:16px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:10px; color:rgba(255,255,255,0.4);
  cursor:pointer; flex-shrink:0; transition:background 0.15s,color 0.15s;
}
.tab-close:hover { background:rgba(255,255,255,0.12); color:#fff; }
.tab-inactive {
  background:transparent; border-color:transparent;
  color:rgba(255,255,255,0.45);
}
.tab-inactive::after { display:none; }
.tab-inactive:hover { background:rgba(255,255,255,0.05); }
.tab-add {
  width:28px; height:28px; border-radius:50%; font-size:18px;
  color:rgba(255,255,255,0.4); cursor:pointer; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  align-self:center; margin-bottom:2px; margin-left:2px;
  transition:background 0.15s,color 0.15s;
}
.tab-add:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.8); }

/* Nav bar */
.nav-bar {
  display:flex; align-items:center;
  padding:5px 10px; gap:6px; height:42px;
  background:var(--chrome-nav);
}
.nav-btn {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; transition:background 0.15s;
  position:relative;
}
.nav-btn:hover { background:rgba(255,255,255,0.08); }
.nav-btn svg { width:16px; height:16px; fill:rgba(255,255,255,0.55); }
.nav-btn.disabled { cursor:default; opacity:0.35; }
.nav-btn.disabled:hover { background:transparent; }
.nav-btn.active svg { fill:var(--cyan); }

.address-bar {
  flex:1; background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px; height:30px;
  display:flex; align-items:center; padding:0 12px; gap:8px;
  font-size:13px; color:rgba(255,255,255,0.5); cursor:text;
  font-family:'Rajdhani',sans-serif; font-weight:500;
  transition:border-color 0.15s,box-shadow 0.15s;
}
.address-bar:hover { border-color:rgba(0,229,255,0.3); }
.address-bar svg { width:14px; height:14px; fill:rgba(255,255,255,0.3); flex-shrink:0; }
.nav-right { display:flex; gap:2px; flex-shrink:0; }

/* Bookmarks bar */
.bookmarks-bar {
  display:flex; align-items:center;
  padding:3px 10px; gap:2px; height:30px;
  background:var(--chrome-bm);
  border-bottom:1px solid rgba(0,229,255,0.06);
  overflow:hidden;
  transition:height 0.2s, opacity 0.2s;
}
.bookmarks-bar.hidden-bar { height:0; opacity:0; pointer-events:none; }
.bm-item {
  display:flex; align-items:center; gap:5px;
  padding:3px 10px; border-radius:6px; cursor:pointer;
  font-size:12px; font-family:'Rajdhani',sans-serif; font-weight:500;
  color:rgba(255,255,255,0.7); white-space:nowrap;
  transition:background 0.15s,color 0.15s;
  flex-shrink:0;
}
.bm-item:hover { background:rgba(255,255,255,0.08); color:#fff; }
.bm-item img { width:14px; height:14px; border-radius:2px; }
.bm-sep {
  width:1px; height:18px; background:rgba(255,255,255,0.1);
  flex-shrink:0; margin:0 4px;
}
.bm-add-btn {
  margin-left:auto; flex-shrink:0;
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; color:rgba(255,255,255,0.3); font-size:16px;
  transition:background 0.15s,color 0.15s;
}
.bm-add-btn:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); }

/* Content */
.content-area { position:relative; z-index:5; flex:1; overflow:hidden; }

.page {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:24px; padding-bottom:40px;
}

#web-panel, #mims-panel {
  position:absolute; inset:0; display:none;
}
#web-panel iframe, #mims-panel iframe {
  width:100%; height:100%; border:none; display:block;
}

/* Title */
.proxy-title {
  font-family:'Orbitron',monospace;
  font-size:clamp(2rem,5vw,3.2rem);
  font-weight:900; font-style:italic; color:var(--cyan);
  text-shadow:0 0 10px var(--cyan),0 0 30px var(--cyan),0 0 70px var(--cyan-dim);
  letter-spacing:4px; animation:flicker 7s infinite;
  user-select:none; cursor:default; transition:transform 0.2s;
}
.proxy-title:hover { transform:scale(1.03); }
@keyframes flicker {
  0%,94%,100%{opacity:1}95%{opacity:0.8}96%{opacity:1}97.5%{opacity:0.65}98.5%{opacity:1}
}

/* Search */
.search-wrap { width:min(720px,85vw); position:relative; }
.search-bar-wrap {
  display:flex; align-items:center; gap:12px;
  background:rgba(210,225,240,0.18);
  backdrop-filter:blur(18px) saturate(1.5);
  -webkit-backdrop-filter:blur(18px) saturate(1.5);
  border:1px solid rgba(255,255,255,0.28);
  border-radius:28px; height:48px; padding:0 16px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.search-bar-wrap:focus-within {
  border-color:rgba(0,229,255,0.6);
  box-shadow:0 0 28px rgba(0,229,255,0.18);
}
.search-icon { width:18px; height:18px; fill:rgba(255,255,255,0.5); flex-shrink:0; }
#search-input {
  flex:1; background:transparent; border:none; outline:none;
  font-size:15px; color:rgba(255,255,255,0.85);
  font-family:'Rajdhani',sans-serif; font-weight:500; caret-color:var(--cyan);
}
#search-input::placeholder { color:rgba(255,255,255,0.45); }
#search-clear {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,0.4); font-size:14px;
  opacity:0; transition:opacity 0.15s; padding:2px 4px; border-radius:50%;
}
#search-clear:hover { color:rgba(255,255,255,0.9); }
#suggestions {
  display:none; position:absolute; top:calc(100% + 6px); width:100%;
  background:rgba(8,20,35,0.96); backdrop-filter:blur(20px);
  border:1px solid rgba(0,229,255,0.2); border-radius:14px; overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,0.5); z-index:200;
}
.suggestion-item {
  display:flex; align-items:center; gap:10px; padding:10px 16px;
  cursor:pointer; font-size:14px; color:rgba(255,255,255,0.75); transition:background 0.1s;
}
.suggestion-item:hover,.suggestion-item:focus { background:rgba(0,229,255,0.1); outline:none; color:#fff; }

/* Shortcuts */
.shortcuts { width:min(900px,90vw); padding:10px 32px; display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
.shortcut { display:flex; flex-direction:column; align-items:center; gap:10px; cursor:pointer; padding:12px 16px; border-radius:12px; transition:background 0.2s,transform 0.15s; position:relative; overflow:hidden; min-width:80px; user-select:none; }
.shortcut:hover { background:rgba(0,229,255,0.07); transform:translateY(-2px); }
.shortcut:active { transform:translateY(0) scale(0.97); }
.shortcut-icon { width:52px; height:52px; border-radius:50%; background:#141420; border:1px solid rgba(255,255,255,0.12); display:flex; align-items:center; justify-content:center; transition:border-color 0.2s,box-shadow 0.2s; }
.shortcut:hover .shortcut-icon { border-color:var(--cyan); box-shadow:0 0 14px rgba(0,229,255,0.35); }
.shortcut-label { font-size:12px; font-family:'Rajdhani',sans-serif; font-weight:500; color:var(--text-main); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:80px; text-align:center; }
.ripple { position:absolute; border-radius:50%; background:rgba(0,229,255,0.25); transform:scale(0); animation:ripple-anim 0.6s linear; pointer-events:none; }
@keyframes ripple-anim { to { transform:scale(2.5); opacity:0; } }
.icon-sw { width:30px; height:30px; border-radius:50%; background:#555; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; font-weight:bold; }

#add-shortcut-btn { background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.3); color:var(--cyan); border-radius:20px; padding:8px 20px; font-size:14px; font-family:'Rajdhani',sans-serif; font-weight:600; cursor:pointer; letter-spacing:1px; transition:background 0.2s,box-shadow 0.2s,transform 0.15s; display:flex; align-items:center; gap:6px; }
#add-shortcut-btn:hover { background:rgba(0,229,255,0.15); box-shadow:0 0 16px rgba(0,229,255,0.2); transform:translateY(-1px); }
#add-shortcut-btn span { font-size:18px; line-height:1; }

/* ── Panels (downloads, extensions, bookmarks mgr) ── */
.side-panel {
  position:fixed; top:0; right:0; bottom:0;
  width:360px; max-width:90vw;
  background:rgba(8,16,28,0.97);
  backdrop-filter:blur(20px);
  border-left:1px solid rgba(0,229,255,0.15);
  z-index:500; transform:translateX(100%);
  transition:transform 0.25s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column;
  box-shadow:-8px 0 32px rgba(0,0,0,0.6);
}
.side-panel.open { transform:translateX(0); }
.panel-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid rgba(0,229,255,0.1);
  flex-shrink:0;
}
.panel-title {
  font-family:'Orbitron',monospace; font-size:13px;
  color:var(--cyan); letter-spacing:2px;
}
.panel-close {
  width:28px; height:28px; border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.4); font-size:16px;
  transition:background 0.15s,color 0.15s;
}
.panel-close:hover { background:rgba(255,255,255,0.08); color:#fff; }
.panel-body { flex:1; overflow-y:auto; padding:12px; }
.panel-body::-webkit-scrollbar { width:4px; }
.panel-body::-webkit-scrollbar-thumb { background:rgba(0,229,255,0.2); border-radius:4px; }

/* Download items */
.dl-item {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px; padding:12px 14px;
  margin-bottom:8px; display:flex; align-items:center; gap:12px;
}
.dl-icon { font-size:22px; flex-shrink:0; }
.dl-info { flex:1; min-width:0; }
.dl-name { font-size:13px; font-weight:600; color:rgba(255,255,255,0.85); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.dl-meta { font-size:11px; color:rgba(255,255,255,0.35); margin-top:2px; }
.dl-bar { height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin-top:6px; overflow:hidden; }
.dl-bar-fill { height:100%; background:var(--cyan); border-radius:2px; transition:width 0.3s; }
.dl-actions { display:flex; gap:6px; flex-shrink:0; }
.dl-btn {
  width:26px; height:26px; border-radius:6px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.06); font-size:12px;
  transition:background 0.15s;
}
.dl-btn:hover { background:rgba(0,229,255,0.15); }

/* Extension items */
.ext-item {
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:10px; padding:12px 14px;
  margin-bottom:8px; display:flex; align-items:flex-start; gap:12px;
}
.ext-icon { font-size:26px; flex-shrink:0; line-height:1; }
.ext-info { flex:1; min-width:0; }
.ext-name { font-size:13px; font-weight:700; color:rgba(255,255,255,0.9); }
.ext-desc { font-size:11px; color:rgba(255,255,255,0.4); margin-top:3px; line-height:1.4; }
.ext-toggle {
  flex-shrink:0; width:36px; height:20px;
  background:rgba(255,255,255,0.1); border-radius:10px;
  cursor:pointer; position:relative; transition:background 0.2s;
  margin-top:2px;
}
.ext-toggle.on { background:var(--cyan); }
.ext-toggle::after {
  content:''; position:absolute; top:2px; left:2px;
  width:16px; height:16px; border-radius:50%;
  background:#fff; transition:left 0.2s;
}
.ext-toggle.on::after { left:18px; }
.ext-actions { display:flex; gap:4px; margin-top:6px; }
.ext-action-btn {
  font-size:10px; padding:2px 8px; border-radius:4px; cursor:pointer;
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.5);
  border:1px solid rgba(255,255,255,0.08);
  font-family:'Rajdhani',sans-serif; font-weight:600;
  transition:background 0.15s,color 0.15s;
}
.ext-action-btn:hover { background:rgba(0,229,255,0.12); color:var(--cyan); }

/* Bookmarks manager */
.bm-manager-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 12px; border-radius:8px;
  margin-bottom:4px; cursor:pointer;
  transition:background 0.15s;
}
.bm-manager-item:hover { background:rgba(255,255,255,0.05); }
.bm-manager-item img { width:16px; height:16px; border-radius:3px; }
.bm-manager-item span { flex:1; font-size:13px; color:rgba(255,255,255,0.75); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.bm-manager-item .bm-del { font-size:12px; color:rgba(255,255,255,0.25); cursor:pointer; padding:2px 6px; border-radius:4px; transition:background 0.15s,color 0.15s; }
.bm-manager-item .bm-del:hover { background:rgba(255,50,50,0.15); color:#ff6b6b; }

/* Panel empty state */
.panel-empty { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.25); font-size:13px; }
.panel-empty .pe-icon { font-size:36px; display:block; margin-bottom:10px; }

/* Panel input */
.panel-input-row { display:flex; gap:8px; padding:12px 0 4px; }
.panel-input {
  flex:1; background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:8px; padding:8px 12px;
  font-size:13px; color:#fff; outline:none;
  font-family:'Rajdhani',sans-serif;
  transition:border-color 0.2s;
}
.panel-input:focus { border-color:var(--cyan); }
.panel-input::placeholder { color:rgba(255,255,255,0.25); }
.panel-btn {
  background:var(--cyan); color:#020a12;
  border:none; border-radius:8px; padding:8px 14px;
  font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:700;
  cursor:pointer; letter-spacing:0.5px; white-space:nowrap;
  transition:background 0.15s,box-shadow 0.15s;
}
.panel-btn:hover { background:#00f5ff; box-shadow:0 0 12px rgba(0,229,255,0.4); }

/* Dropdown (badge) */
.badge {
  position:absolute; top:2px; right:2px;
  width:14px; height:14px; border-radius:50%;
  background:var(--cyan); color:#020a12;
  font-size:8px; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}

/* Context menu & modal (same as before) */
#ctx-menu {
  display:none; position:fixed; z-index:9999;
  background:rgba(8,20,35,0.97);
  border:1px solid rgba(0,229,255,0.25);
  border-radius:10px; overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,0.6);
  opacity:0; transition:opacity 0.15s; min-width:150px;
}
.ctx-item { padding:10px 16px; cursor:pointer; font-size:14px; color:rgba(255,255,255,0.8); transition:background 0.1s,color 0.1s; }
.ctx-item:hover { background:rgba(0,229,255,0.12); color:#fff; }
#modal-overlay {
  display:none; position:fixed; inset:0; z-index:9998;
  background:rgba(0,0,0,0.6); backdrop-filter:blur(4px);
  align-items:center; justify-content:center; opacity:0; transition:opacity 0.2s;
}
#modal {
  background:rgba(8,20,38,0.98); border:1px solid rgba(0,229,255,0.3);
  border-radius:16px; padding:28px 32px; width:min(420px,90vw);
  box-shadow:0 0 40px rgba(0,229,255,0.15),0 20px 60px rgba(0,0,0,0.6);
  display:flex; flex-direction:column; gap:12px;
}
#modal-title { font-family:'Orbitron',monospace; font-size:16px; color:var(--cyan); letter-spacing:2px; }
#modal label { font-size:12px; color:rgba(255,255,255,0.5); letter-spacing:1px; text-transform:uppercase; }
#modal input { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:8px; padding:10px 14px; font-size:14px; color:#fff; outline:none; font-family:'Rajdhani',sans-serif; transition:border-color 0.2s,box-shadow 0.2s; }
#modal input:focus { border-color:var(--cyan); box-shadow:0 0 12px rgba(0,229,255,0.15); }
#modal input::placeholder { color:rgba(255,255,255,0.3); }
#modal-btns { display:flex; gap:10px; margin-top:6px; justify-content:flex-end; }
#modal-btns button { padding:9px 22px; border-radius:8px; font-size:14px; font-family:'Rajdhani',sans-serif; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; letter-spacing:1px; }
#modal-cancel { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.6); }
#modal-cancel:hover { background:rgba(255,255,255,0.12); color:#fff; }
#modal-save { background:var(--cyan); color:#020a12; }
#modal-save:hover { background:#00f5ff; box-shadow:0 0 16px rgba(0,229,255,0.4); }

#toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:rgba(0,229,255,0.15); border:1px solid rgba(0,229,255,0.4);
  color:var(--cyan); padding:10px 22px; border-radius:20px;
  font-size:14px; font-family:'Rajdhani',sans-serif; font-weight:600;
  letter-spacing:1px; z-index:9999;
  opacity:0; pointer-events:none; transition:opacity 0.3s; backdrop-filter:blur(10px);
}
#toast.show { opacity:1; }

/* Overlay scrim for panels */
#panel-scrim {
  display:none; position:fixed; inset:0; z-index:499;
  background:rgba(0,0,0,0.3);
}
#panel-scrim.show { display:block; }
  </style>
</head>
<body>

<canvas id="city-canvas"></canvas>

<!-- Panel scrim -->
<div id="panel-scrim"></div>

<!-- Downloads panel -->
<div class="side-panel" id="panel-downloads">
  <div class="panel-header">
    <span class="panel-title">DOWNLOADS</span>
    <div class="panel-close" onclick="closePanel('downloads')">✕</div>
  </div>
  <div class="panel-body" id="downloads-body"></div>
</div>

<!-- Extensions panel -->
<div class="side-panel" id="panel-extensions">
  <div class="panel-header">
    <span class="panel-title">EXTENSIONS</span>
    <div class="panel-close" onclick="closePanel('extensions')">✕</div>
  </div>
  <div class="panel-body" id="extensions-body"></div>
</div>

<!-- Bookmarks manager panel -->
<div class="side-panel" id="panel-bookmarks">
  <div class="panel-header">

  const pg=ctx.createRadialGradient(W*.88,H*.3,0,W*.88,H*.3,W*.25);pg.addColorStop(0,'rgba(255,0,120,.06)');pg.addColorStop(1,'transparent');ctx.fillStyle=pg;ctx.fillRect(0,0,W,H);

function getFavicon(url){try{return `https://www.google.com/s2/favicons?sz=16&domain=${new URL(url).hostname}`;}catch{return '';}}

function renderBookmarksBar(){
  const bar=document.getElementById('bookmarks-bar');
  bar.querySelectorAll('.bm-item,.bm-sep').forEach(el=>el.remove());
  const addBtn=document.getElementById('bm-bar-add');
  bookmarks.forEach(bm=>{
    const el=document.createElement('div');
    el.className='bm-item';
    const fav=getFavicon(bm.url);
    el.innerHTML=`${fav?`<img src="${fav}" onerror="this.style.display='none'">`:''}${bm.title}`;
    el.title=bm.url;
    el.addEventListener('click',()=>openUrl(bm.url));
    el.addEventListener('contextmenu',e=>{e.preventDefault();if(confirm(`Remove "${bm.title}" from bookmarks?`)){bookmarks=bookmarks.filter(b=>b.id!==bm.id);saveBookmarks();renderBookmarksBar();renderBookmarksPanel();}});
    bar.insertBefore(el,addBtn);
  });
}

function renderBookmarksPanel(){
  const body=document.getElementById('bookmarks-body');
  if(!body)return;
  body.innerHTML='';
  // Add form
  const form=document.createElement('div');
  form.innerHTML=`
    <div style="margin-bottom:12px;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;">Add Bookmark</div>
    <div class="panel-input-row">
      <input class="panel-input" id="bm-add-name" placeholder="Name" autocomplete="off">
    </div>
    <div class="panel-input-row">
      <input class="panel-input" id="bm-add-url" placeholder="https://..." autocomplete="off">
      <button class="panel-btn" id="bm-add-save">Add</button>
    </div>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.06);margin:12px 0;">
    <div style="margin-bottom:8px;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;">Saved Bookmarks</div>
  `;
  body.appendChild(form);
  document.getElementById('bm-add-save').addEventListener('click',()=>{
    const name=document.getElementById('bm-add-name').value.trim();
    const url=document.getElementById('bm-add-url').value.trim();
    if(!name||!url){showToast('Fill in both fields');return;}
    bookmarks.push({id:nextBmId++,title:name,url});
    saveBookmarks();renderBookmarksBar();renderBookmarksPanel();
    showToast('Bookmark added!');
  });
  if(bookmarks.length===0){
    const empty=document.createElement('div');
    empty.className='panel-empty';
    empty.innerHTML='<span class="pe-icon">🔖</span>No bookmarks yet';
    body.appendChild(empty);return;
  }
  bookmarks.forEach(bm=>{
    const el=document.createElement('div');
    el.className='bm-manager-item';
    const fav=getFavicon(bm.url);
    el.innerHTML=`${fav?`<img src="${fav}" onerror="this.style.display='none'">`:'🌐'}<span title="${bm.url}">${bm.title}</span><span class="bm-del" title="Delete">✕</span>`;
    el.querySelector('span:first-of-type').addEventListener('click',()=>openUrl(bm.url));
    el.querySelector('.bm-del').addEventListener('click',e=>{e.stopPropagation();bookmarks=bookmarks.filter(b=>b.id!==bm.id);saveBookmarks();renderBookmarksBar();renderBookmarksPanel();});
    body.appendChild(el);
  });
}

let downloads=JSON.parse(localStorage.getItem('ep_downloads')||'[]');
let nextDlId=downloads.length?Math.max(...downloads.map(d=>d.id))+1:1;
function saveDownloads(){localStorage.setItem('ep_downloads',JSON.stringify(downloads));}
function updateDlBadge(){
  const badge=document.getElementById('dl-badge');
  const active=downloads.filter(d=>d.status==='downloading').length;
  if(badge){badge.style.display=active>0?'flex':'none';badge.textContent=active;}
}
function renderDownloadsPanel(){
  const body=document.getElementById('downloads-body');
  if(!body)return;
  body.innerHTML='';
  // Manual add row
  const addRow=document.createElement('div');
  addRow.innerHTML=`
    <div style="margin-bottom:8px;font-size:11px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;">Add Download</div>
    <div class="panel-input-row">
      <input class="panel-input" id="dl-add-url" placeholder="https://example.com/file.zip" autocomplete="off">
      <button class="panel-btn" id="dl-add-btn">⬇</button>
    </div>
    <hr style="border:none;border-top:1px solid rgba(255,255,255,0.06);margin:12px 0;">
  `;
  body.appendChild(addRow);
  document.getElementById('dl-add-btn').addEventListener('click',()=>{
    const url=document.getElementById('dl-add-url').value.trim();
    if(!url){showToast('Enter a URL');return;}
    addDownload(url);
    document.getElementById('dl-add-url').value='';
  });
  if(downloads.length===0){
    const empty=document.createElement('div');
    empty.className='panel-empty';
    empty.innerHTML='<span class="pe-icon">⬇️</span>No downloads yet';
    body.appendChild(empty);return;
  }
  [...downloads].reverse().forEach(dl=>{
    const el=document.createElement('div');
    el.className='dl-item';
    const icons={'pdf':'📄','zip':'🗜️','mp4':'🎬','mp3':'🎵','exe':'⚙️','png':'🖼️','jpg':'🖼️','gif':'🖼️','doc':'📝','xls':'📊'};
    const ext=(dl.name||'').split('.').pop().toLowerCase();
    const icon=icons[ext]||'📎';
    const pct=dl.progress||0;
    el.innerHTML=`
      <div class="dl-icon">${icon}</div>
      <div class="dl-info">
        <div class="dl-name">${dl.name||'Unknown file'}</div>
        <div class="dl-meta">${dl.status==='done'?'Complete':dl.status==='error'?'Failed':`${pct}%`} · ${dl.size||'?'}</div>
        ${dl.status==='downloading'?`<div class="dl-bar"><div class="dl-bar-fill" style="width:${pct}%"></div></div>`:''}
      </div>
      <div class="dl-actions">
        ${dl.status==='done'?`<div class="dl-btn" title="Open" onclick="window.open('${dl.url}','_blank')">🔗</div>`:''}
        <div class="dl-btn" title="Remove" onclick="removeDownload(${dl.id})">✕</div>
      </div>
    `;
    body.appendChild(el);
  });
}

function addDownload(url){
  let name; try{name=decodeURIComponent(new URL(url).pathname.split('/').pop())||'file';}catch{name='file';}
  const dl={id:nextDlId++,name,url,size:'?',progress:0,status:'downloading'};
  downloads.push(dl);saveDownloads();renderDownloadsPanel();updateDlBadge();
  // Simulate progress
  let pct=0;
  const iv=setInterval(()=>{
    pct+=Math.random()*15+5;
    if(pct>=100){pct=100;dl.progress=100;dl.status='done';dl.size=Math.floor(Math.random()*50+1)+'MB';clearInterval(iv);}
    else dl.progress=Math.floor(pct);
    saveDownloads();renderDownloadsPanel();updateDlBadge();
  },400);
  showToast(`Downloading: ${name}`);
  openPanel('downloads');
}

function removeDownload(id){
  downloads=downloads.filter(d=>d.id!==id);
  saveDownloads();renderDownloadsPanel();updateDlBadge();
}

function toggleExt(id){
  const ext=extensions.find(e=>e.id===id);
  if(!ext)return;
  ext.enabled=!ext.enabled;
  saveExtensions();
  const t=document.getElementById(`ext-toggle-${id}`);
  if(t)t.classList.toggle('on',ext.enabled);
  showToast(`${ext.name} ${ext.enabled?'enabled':'disabled'}`);
}
function removeExt(id){
  const ext=extensions.find(e=>e.id===id);
  if(ext&&confirm(`Remove "${ext.name}"?`)){extensions=extensions.filter(e=>e.id!==id);saveExtensions();renderExtensionsPanel();}
}

let activePanel=null;
function openPanel(name){
  if(activePanel===name){closePanel(name);return;}
  if(activePanel)document.getElementById(`panel-${activePanel}`).classList.remove('open');
  activePanel=name;
  const panel=document.getElementById(`panel-${name}`);
  if(!panel)return;
  // Refresh content
  if(name==='bookmarks')renderBookmarksPanel();
  if(name==='downloads')renderDownloadsPanel();
  if(name==='extensions')renderExtensionsPanel();
  panel.classList.add('open');
  document.getElementById('panel-scrim').classList.add('show');
}
function closePanel(name){
  const panel=document.getElementById(`panel-${name}`);
  if(panel)panel.classList.remove('open');
  document.getElementById('panel-scrim').classList.remove('show');
  activePanel=null;
}
document.getElementById('panel-scrim').addEventListener('click',()=>{if(activePanel)closePanel(activePanel);});
document.getElementById('btn-downloads').addEventListener('click',()=>openPanel('downloads'));
document.getElementById('btn-extensions').addEventListener('click',()=>openPanel('extensions'));

function showPanel(which){
  homePage.style.display=which==='home'?'flex':'none';
  webPanel.style.display=which==='web'?'block':'none';
  mimsPanel.style.display=which==='mims'?'block':'none';
}
function loadMims(){
  if(mimsLoaded)return; mimsLoaded=true;
  const el=document.getElementById('mims-source');if(!el)return;
  try{const c=JSON.parse(el.textContent);const blob=new Blob([c],{type:'text/html'});mimsIframe.src=URL.createObjectURL(blob);}catch(e){console.warn('MIMS load error:',e);}
}

function openUrl(raw,addToHistory=true){
  let url=(raw||'').trim();if(!url)return;
  let full;
  if(url==='ep://home'||url==='mims://portal')full=url;
  else if(/^https?:\/\//i.test(url))full=url;
  else if(url.includes('.')&&!url.includes(' '))full='https://'+url;
  else full='https://www.google.com/search?q='+encodeURIComponent(url);
  const state=tabState[activeTabId];if(!state)return;
  if(addToHistory&&full!==state.history[state.histIdx]){state.history=state.history.slice(0,state.histIdx+1);state.history.push(full);state.histIdx=state.history.length-1;}
  state.url=full;
  const tab=tabs.find(t=>t.id===activeTabId);
  if(tab&&!tab.fixed){if(full==='ep://home')tab.title='Endless Proxy';else{try{tab.title=new URL(full).hostname.replace('www.','');}catch{tab.title=full.slice(0,20);}}saveTabs();}
  if(full==='ep://home'){state.panel='home';showPanel('home');}
  else if(full==='mims://portal'){state.panel='mims';showPanel('mims');loadMims();}
  else{state.panel='web';showPanel('web');webIframe.src=full;}
  updateAddressBar(full);updateNavBtns();renderTabs();hideSuggestions();
  if(searchInput){searchInput.value='';} if(searchClear){searchClear.style.opacity='0';}
}

function updateAddressBar(url){
  if(!navAddrText)return;
  if(!url||url==='ep://home')navAddrText.textContent='Search with Google or enter address';
  else if(url==='mims://portal')navAddrText.textContent='MIMS Portal';
  else navAddrText.textContent=url;
}
function updateNavBtns(){
  const s=tabState[activeTabId];
  const b=document.getElementById('btn-back'),f=document.getElementById('btn-forward');
  if(b)b.classList.toggle('disabled',!s||s.histIdx<=0);
  if(f)f.classList.toggle('disabled',!s||s.histIdx>=s.history.length-1);
}

const tabBarEl=document.getElementById('tab-bar');
const addBtn=document.getElementById('btn-new-tab');

function renderTabs(){
  tabBarEl.querySelectorAll('.tab').forEach(el=>el.remove());
  tabs.forEach(tab=>{
    const isActive=tab.id===activeTabId,isMims=tab.id===MIMS_ID;
    const el=document.createElement('div');
    el.className='tab'+(isActive?'':' tab-inactive');
    const fav=isMims
      ?`<div class="tab-favicon" style="background:rgba(0,229,255,0.25)"><svg viewBox="0 0 24 24" style="width:10px;height:10px;fill:#020a12"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>`
      :`<div class="tab-favicon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg></div>`;
    const action=isMims?`<span style="font-size:9px;opacity:0.5;flex-shrink:0;">📌</span>`:`<div class="tab-close">✕</div>`;
    el.innerHTML=`${fav}<span class="tab-title">${tab.title}</span>${action}`;
    el.addEventListener('click',e=>{if(e.target.classList.contains('tab-close'))return;switchTab(tab.id);});
    if(!isMims){
      el.querySelector('.tab-title').addEventListener('dblclick',e=>{e.stopPropagation();const inp=document.createElement('input');inp.value=tab.title;inp.style.cssText='background:transparent;border:none;outline:none;color:rgba(255,255,255,0.85);font-family:Rajdhani,sans-serif;font-size:12px;width:100%;';el.querySelector('.tab-title').replaceWith(inp);inp.focus();inp.select();const done=()=>{tab.title=inp.value.trim()||'New Tab';saveTabs();renderTabs();};inp.addEventListener('blur',done);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape'){inp.value=tab.title;inp.blur();}});});
      const x=el.querySelector('.tab-close');if(x)x.addEventListener('click',e=>{e.stopPropagation();closeTab(tab.id);});
    }
    tabBarEl.insertBefore(el,addBtn);
  });
}

function switchTab(id){
  tabs.forEach(t=>t.active=t.id===id);activeTabId=id;saveTabs();
  if(!tabState[id])tabState[id]={history:[id===MIMS_ID?'mims://portal':'ep://home'],histIdx:0,panel:id===MIMS_ID?'mims':'home',url:'New Tab'};
  const s=tabState[id];showPanel(s.panel);
  if(s.panel==='web')webIframe.src=s.history[s.histIdx];
  if(s.panel==='mims')loadMims();
  updateAddressBar(s.url);updateNavBtns();renderTabs();
}
function closeTab(id){
  if(id===MIMS_ID){showToast('MIMS Portal is pinned');return;}
  if(tabs.filter(t=>t.id!==MIMS_ID).length<=1){showToast("Can't close last tab");return;}
  const idx=tabs.findIndex(t=>t.id===id);tabs=tabs.filter(t=>t.id!==id);delete tabState[id];
  if(activeTabId===id){const next=tabs[Math.min(idx,tabs.length-1)];activeTabId=next.id;tabs.forEach(t=>t.active=t.id===activeTabId);}
  saveTabs();switchTab(activeTabId);
}
if(addBtn)addBtn.addEventListener('click',()=>{const t={id:nextTabId++,title:'New Tab',active:false};tabs.push(t);tabState[t.id]={history:['ep://home'],histIdx:0,panel:'home',url:'New Tab'};saveTabs();switchTab(t.id);});

function bSVG(){return `<svg viewBox="0 0 24 24" width="26" height="26"><path fill="#3b9ce5" d="M5 3l4 1.5v12.3l4.3-2.5-1.8-1.1 2.8-5.9L20 9.8 12.8 21 5 17.3z"/></svg>`;}
function favImg(url){try{const d=new URL(url).hostname;return `<img src="https://www.google.com/s2/favicons?sz=32&domain=${d}" width="28" height="28" onerror="this.outerHTML='<span style=font-size:18px>🌐</span>'">`;}catch{return `<span style="font-size:18px">🌐</span>`;}}
function iconHTML(s){if(s.type==='google')return gSVG();if(s.type==='bing')return bSVG();if(s.type==='letter')return `<div class="icon-sw">${s.icon||'?'}</div>`;return favImg(s.url);}
function renderShortcuts(){
  const c=document.getElementById('shortcuts-container');if(!c)return;c.innerHTML='';
  shortcuts.forEach(s=>{const el=document.createElement('div');el.className='shortcut';el.innerHTML=`<div class="shortcut-icon">${iconHTML(s)}</div><span class="shortcut-label">${s.label}</span>`;
    el.addEventListener('click',()=>openUrl(s.url));el.addEventListener('contextmenu',e=>showCtxMenu(e,s.id));
    el.addEventListener('mousedown',e=>{const r=document.createElement('span');r.className='ripple';const rect=el.getBoundingClientRect(),sz=Math.max(rect.width,rect.height);r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;el.appendChild(r);setTimeout(()=>r.remove(),600);});
    c.appendChild(el);});
}
renderShortcuts();

// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
const quickSugg=[{text:'google.com',url:'https://google.com'},{text:'youtube.com',url:'https://youtube.com'},{text:'github.com',url:'https://github.com'},{text:'reddit.com',url:'https://reddit.com'},{text:'twitter.com',url:'https://twitter.com'},{text:'wikipedia.org',url:'https://wikipedia.org'}];
if(searchInput){
  searchInput.addEventListener('input',()=>{const v=searchInput.value.trim();if(searchClear)searchClear.style.opacity=v?'1':'0';if(navAddrText)navAddrText.textContent=v||'Search with Google or enter address';showSugg(v);});
  searchInput.addEventListener('keydown',e=>{if(e.key==='Enter'){const v=searchInput.value.trim();if(v){hideSuggestions();openUrl(v);searchInput.blur();}}if(e.key==='Escape'){hideSuggestions();searchInput.blur();}if(e.key==='ArrowDown'){const items=suggestionsEl?suggestionsEl.querySelectorAll('.suggestion-item'):[];if(items.length){items[0].focus();e.preventDefault();}}});
}
if(searchClear)searchClear.addEventListener('click',()=>{if(searchInput){searchInput.value='';searchInput.focus();}searchClear.style.opacity='0';if(navAddrText)navAddrText.textContent='Search with Google or enter address';hideSuggestions();});
const _addr=document.getElementById('nav-address-bar');
if(_addr)_addr.addEventListener('click',()=>{if(searchInput){const s=tabState[activeTabId];if(s&&s.url&&s.url!=='ep://home'&&s.url!=='New Tab')searchInput.value=s.url;searchInput.focus();searchInput.select();}});
const _bsi=document.getElementById('btn-search-icon');
if(_bsi)_bsi.addEventListener('click',()=>{if(searchInput){searchInput.focus();searchInput.select();}});
function showSugg(val){
  if(!val||!suggestionsEl){hideSuggestions();return;}
  const f=quickSugg.filter(s=>s.text.includes(val.toLowerCase()));
  const all=[{text:`Search Google for "${val}"`,url:`https://www.google.com/search?q=${encodeURIComponent(val)}`,isSearch:true},...f].slice(0,6);
  suggestionsEl.innerHTML=all.map(s=>`<div class="suggestion-item" tabindex="0" data-url="${s.url}">${s.isSearch?'🔍':'🌐'} <span>${s.text}</span></div>`).join('');
  suggestionsEl.style.display='block';
  suggestionsEl.querySelectorAll('.suggestion-item').forEach(item=>{item.addEventListener('click',()=>openUrl(item.dataset.url));item.addEventListener('keydown',e=>{if(e.key==='Enter')openUrl(item.dataset.url);if(e.key==='ArrowDown'&&item.nextSibling)item.nextSibling.focus();if(e.key==='ArrowUp'){const p=item.previousSibling;p?p.focus():(searchInput&&searchInput.focus());}});});
}
function hideSuggestions(){if(suggestionsEl)suggestionsEl.style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap')&&!e.target.closest('#nav-address-bar'))hideSuggestions();});

// ═══════════════════════════════════════════
//  NAV BUTTONS
// ═══════════════════════════════════════════
const _reload=document.getElementById('btn-reload');
if(_reload)_reload.addEventListener('click',()=>{_reload.style.transform='rotate(360deg)';_reload.style.transition='transform 0.5s ease';setTimeout(()=>{_reload.style.transform='';_reload.style.transition='';},500);const s=tabState[activeTabId];if(!s)return;if(s.panel==='web')try{webIframe.contentWindow.location.reload();}catch{webIframe.src=s.history[s.histIdx];}if(s.panel==='mims')try{mimsIframe.contentWindow.location.reload();}catch{}});
const _back=document.getElementById('btn-back');
if(_back)_back.addEventListener('click',()=>{const s=tabState[activeTabId];if(!s||s.histIdx<=0)return;s.histIdx--;openUrl(s.history[s.histIdx],false);});
const _fwd=document.getElementById('btn-forward');
if(_fwd)_fwd.addEventListener('click',()=>{const s=tabState[activeTabId];if(!s||s.histIdx>=s.history.length-1)return;s.histIdx++;openUrl(s.history[s.histIdx],false);});

// ═══════════════════════════════════════════
//  CONTEXT MENU
// ═══════════════════════════════════════════
const ctxMenu=document.getElementById('ctx-menu');let ctxTargetId=null;
function showCtxMenu(e,id){if(!ctxMenu)return;e.preventDefault();ctxTargetId=id;ctxMenu.style.left=Math.min(e.clientX,innerWidth-160)+'px';ctxMenu.style.top=Math.min(e.clientY,innerHeight-80)+'px';ctxMenu.style.display='block';requestAnimationFrame(()=>ctxMenu.style.opacity='1');}
function hideCtxMenu(){if(!ctxMenu)return;ctxMenu.style.opacity='0';setTimeout(()=>ctxMenu.style.display='none',150);}
document.addEventListener('click',hideCtxMenu);
const _ce=document.getElementById('ctx-edit');if(_ce)_ce.addEventListener('click',()=>{const s=shortcuts.find(x=>x.id===ctxTargetId);if(s)openModal(s);});
const _cr=document.getElementById('ctx-remove');if(_cr)_cr.addEventListener('click',()=>{shortcuts=shortcuts.filter(x=>x.id!==ctxTargetId);saveShortcuts();renderShortcuts();showToast('Shortcut removed');});

// ═══════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════
const modalOverlay=document.getElementById('modal-overlay');
const modalName=document.getElementById('modal-name');
const modalUrl=document.getElementById('modal-url');
let editingId=null;
function openModal(s){if(!modalOverlay||!modalName||!modalUrl)return;editingId=s?s.id:null;const t=document.getElementById('modal-title');if(t)t.textContent=s?'Edit Shortcut':'Add Shortcut';modalName.value=s?s.label:'';modalUrl.value=s?s.url:'';modalOverlay.style.display='flex';requestAnimationFrame(()=>modalOverlay.style.opacity='1');modalName.focus();}
function closeModal(){if(!modalOverlay)return;modalOverlay.style.opacity='0';setTimeout(()=>modalOverlay.style.display='none',200);}
const _mc=document.getElementById('modal-cancel');if(_mc)_mc.addEventListener('click',closeModal);
if(modalOverlay)modalOverlay.addEventListener('click',e=>{if(e.target===modalOverlay)closeModal();});
const _ms=document.getElementById('modal-save');
if(_ms)_ms.addEventListener('click',()=>{if(!modalName||!modalUrl)return;const name=modalName.value.trim(),url=modalUrl.value.trim();if(!name||!url){showToast('Fill in both fields');return;}if(editingId){const s=shortcuts.find(x=>x.id===editingId);if(s){s.label=name;s.url=url;s.type='favicon';}}else shortcuts.push({id:nextId++,label:name,url,type:'favicon'});saveShortcuts();renderShortcuts();closeModal();showToast(editingId?'Shortcut updated!':'Shortcut added!');});
[modalName,modalUrl].filter(Boolean).forEach(inp=>inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&_ms)_ms.click();if(e.key==='Escape')closeModal();}));
const _ab=document.getElementById('add-shortcut-btn');if(_ab)_ab.addEventListener('click',()=>openModal(null));

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className='show';clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.className='',2500);}

// ═══════════════════════════════════════════
//  PROXY TITLE → RESET SHORTCUTS
// ═══════════════════════════════════════════
const _pt=document.getElementById('proxy-title');
if(_pt)_pt.addEventListener('dblclick',()=>{if(confirm('Reset shortcuts to default?')){shortcuts=JSON.parse(JSON.stringify(DEFAULT_SHORTCUTS));saveShortcuts();renderShortcuts();showToast('Shortcuts reset');}});

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderBookmarksBar();
updateDlBadge();
renderTabs();
switchTab(activeTabId);
</script>

</body>
</html>
